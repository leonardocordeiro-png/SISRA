<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport & Mobile ──────────────────────────────────────────── -->
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />

    <!-- ── Identity ──────────────────────────────────────────────────── -->
    <title>La Salle, Cheguei!</title>
    <meta name="description"
          content="Sistema Inteligente de Saída e Retirada de Alunos — controle seguro de retiradas escolares." />

    <!-- ── PWA Theme ──────────────────────────────────────────────────── -->
    <meta name="theme-color" content="#070a14" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── Apple / iOS ───────────────────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SISRA" />
    <link rel="apple-touch-icon" href="/icon.svg" />

    <!-- ── Favicon / Icon ────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="shortcut icon" href="/icon.svg" />

    <!-- ── Open Graph (compartilhamento social) ──────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="La Salle, Cheguei!" />
    <meta property="og:description"
          content="Sistema Inteligente de Saída e Retirada de Alunos." />
    <meta property="og:image" content="/icon.svg" />

    <meta name="msapplication-TileColor" content="#070a14" />
