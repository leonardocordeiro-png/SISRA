<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2540"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4d06f"/>
      <stop offset="100%" stop-color="#c79e61"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>

  <!-- Shield shape -->
  <path d="M256 80 L380 130 L380 270 C380 340 330 395 256 430 C182 395 132 340 132 270 L132 130 Z"
        fill="none" stroke="url(#gold)" stroke-width="14" stroke-linejoin="round"/>

  <!-- Check mark inside shield -->
  <polyline points="200,260 238,300 312,215"
            fill="none" stroke="url(#gold)" stroke-width="20"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- App name bottom -->
  <text x="256" y="478" text-anchor="middle"
        font-family="'Inter', system-ui, sans-serif"
        font-size="44" font-weight="700" letter-spacing="2"
        fill="#c79e61" opacity="0.85">SISRA</text>
</svg>
