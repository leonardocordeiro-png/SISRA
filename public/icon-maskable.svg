<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2540"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4d06f"/>
      <stop offset="100%" stop-color="#c79e61"/>
    </linearGradient>
  </defs>

  <!-- Full bleed background (maskable — safe zone is center 80%) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Shield -->
  <path d="M256 100 L370 145 L370 265 C370 330 323 382 256 415 C189 382 142 330 142 265 L142 145 Z"
        fill="none" stroke="url(#gold)" stroke-width="13" stroke-linejoin="round"/>

  <!-- Check -->
  <polyline points="206,260 242,298 308,218"
            fill="none" stroke="url(#gold)" stroke-width="18"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
